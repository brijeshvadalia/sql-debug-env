name: sql-debug-env
version: "3.0.0"
description: >
  A real-world OpenEnv environment where AI agents learn to debug, fix, and
  optimize SQL queries against a realistic e-commerce database. Features 8 tasks
  across easy/medium/hard/expert difficulties, multi-turn conversation memory,
  a 3-level hint system with reward penalties, EXPLAIN query plan analysis,
  curriculum auto-advancement, model leaderboard, and batch evaluation.
  Built for the Scaler x Meta PyTorch OpenEnv Hackathon 2026.

author: Brijesh8128
tags:
  - openenv
  - sql
  - debugging
  - data-engineering
  - real-world
  - curriculum-learning
  - multi-turn

license: apache-2.0
python_requires: ">=3.11"

tasks:
  - id: fix_syntax_error
    name: "Fix SQL Syntax Error"
    difficulty: easy
    description: >
      Agent receives a SQL query with 3 misspelled keywords (SELEC, FORM, ORDR BY)
      and must fix them to retrieve VIP-tier customers ordered by name.
    max_steps: 5
    reward_threshold: 0.8
    tags: [syntax, beginner, keywords]

  - id: fix_logic_error
    name: "Fix SQL Logic / Join Error"
    difficulty: medium
    description: >
      Query uses INNER JOIN (drops orders with no items) and sums the wrong column
      (orders.total_amount instead of SUM(oi.quantity * oi.unit_price)). Agent must
      fix both bugs to return all 11 orders with correct computed totals.
    max_steps: 8
    reward_threshold: 0.7
    tags: [join, aggregation, logic]

  - id: fix_null_handling
    name: "Fix NULL Handling in Aggregation"
    difficulty: medium
    description: >
      INNER JOIN excludes products with no reviews, and AVG() returns NULL instead
      of 0.0 for unreviewed products. Agent must use LEFT JOIN and COALESCE.
    max_steps: 6
    reward_threshold: 0.75
    tags: [null, coalesce, left-join]

  - id: fix_subquery_bug
    name: "Fix Correlated Subquery Alias Bug"
    difficulty: medium
    description: >
      Alias 'oi' is reused in the inner subquery, shadowing the outer query alias
      and producing wrong HAVING results. Agent must rename inner alias to 'oi2'.
    max_steps: 6
    reward_threshold: 0.75
    tags: [subquery, alias, having]

  - id: optimize_query
    name: "Optimize Slow SQL Query (N+1)"
    difficulty: hard
    description: >
      Two correlated scalar subqueries re-scan tables for every customer row (N+1
      pattern). Agent must rewrite as a single LEFT JOIN plus GROUP BY for linear
      time complexity. Graded 60% correctness + 40% speedup vs baseline.
    max_steps: 10
    reward_threshold: 0.6
    tags: [performance, n+1, optimization]

  - id: fix_window_function
    name: "Fix Window Function (RANK)"
    difficulty: hard
    description: >
      ROW_NUMBER() used instead of RANK(), and PARTITION BY uses wrong column
      (tier instead of region). Agent must fix both to rank customers correctly
      within each geographic region.
    max_steps: 8
    reward_threshold: 0.6
    tags: [window-function, rank, partition]

  - id: fix_cte
    name: "Fix CTE (Common Table Expression)"
    difficulty: hard
    description: >
      CTE divides total_revenue by itself (always 100%). Agent must use the grand
      total subquery: ROUND(total_revenue * 100.0 / (SELECT SUM(total_revenue)
      FROM customer_revenue), 2) as the correct percentage calculation.
    max_steps: 8
    reward_threshold: 0.6
    tags: [cte, percentage, subquery]

  - id: multi_step_aggregation
    name: "Multi-Dimension Sales Report"
    difficulty: expert
    description: >
      Query missing GROUP BY clause and uses 0 for avg_order_value. Agent must add
      GROUP BY p.category, c.tier and compute real average order value using
      ROUND(SUM(...) / COUNT(DISTINCT o.id), 2). Returns 7-row category x tier report.
    max_steps: 10
    reward_threshold: 0.6
    tags: [aggregation, group-by, multi-dimension, expert]

advanced_features:
  multi_turn_memory:
    enabled: true
    description: >
      Every observation includes conversation_history with last 5 steps
      (SQL query, error, reward, result_count). Enables agents to learn
      from failed attempts within the same episode.

  hint_system:
    enabled: true
    endpoint: POST /hint
    levels: 3
    penalty_per_hint: 0.10
    max_penalty: 0.30
    description: >
      Progressive 3-level hints with reward penalties. Level 1 gives general
      direction, Level 2 identifies the specific bug, Level 3 gives exact fix.

  query_analysis:
    enabled: true
    description: >
      Every step() response includes query_analysis with EXPLAIN QUERY PLAN
      summary: scan_count, uses_index, tables_scanned, plan_steps, suggestion.

  curriculum_learning:
    enabled: true
    endpoint: GET /curriculum
    advance_threshold: 0.8
    advance_episodes: 3
    order: [fix_syntax_error, fix_logic_error, fix_null_handling,
            fix_subquery_bug, optimize_query, fix_window_function,
            fix_cte, multi_step_aggregation]
    description: >
      Auto-advances easy -> medium -> hard -> expert when agent achieves
      average score >= 0.8 over 3 consecutive episodes.

  leaderboard:
    enabled: true
    endpoints:
      - GET /leaderboard
      - POST /leaderboard/submit

  batch_evaluation:
    enabled: true
    endpoint: POST /evaluate/batch
    description: >
      Score any SQL query against all 8 tasks in a single API call.

action_space:
  type: object
  required: [sql_query]
  properties:
    sql_query:
      type: string
      description: SQL query to execute against the environment SQLite database.
    reasoning:
      type: string
      nullable: true
      description: Optional chain-of-thought (logged, not evaluated).

observation_space:
  type: object
  properties:
    episode_id:
      type: string
      description: UUID of current episode.
    task_id:
      type: string
    task_description:
      type: string
    broken_query:
      type: string
    schema_hint:
      type: string
    error_message:
      type: string
      nullable: true
    query_result:
      type: array
      nullable: true
    row_count:
      type: integer
      description: Number of rows returned by the query.
    execution_time_ms:
      type: number
      nullable: true
    reward:
      type: number
      minimum: 0.0
      maximum: 1.0
    reward_breakdown:
      type: object
      nullable: true
      properties:
        total: {type: number}
        correctness: {type: number}
        efficiency: {type: number}
        step_penalty: {type: number}
        row_coverage: {type: number, description: Fraction of expected rows matched}
        column_coverage: {type: number, description: Fraction of expected columns present}
        hint_penalty: {type: number, description: Accumulated hint penalty 0.0-0.3}
        explanation: {type: string}
    conversation_history:
      type: array
      description: Last 5 steps with sql, error, reward, result_count, complexity.
    query_complexity:
      type: object
      nullable: true
      description: Structural complexity classifier (NEW in v3.0)
      properties:
        label: {type: string, enum: [simple, moderate, complex, advanced]}
        has_join: {type: boolean}
        has_aggregation: {type: boolean}
        has_window_function: {type: boolean}
        has_cte: {type: boolean}
        has_subquery: {type: boolean}
        join_count: {type: integer}
        subquery_depth: {type: integer}
        complexity_score: {type: number, minimum: 0.0, maximum: 1.0}
    performance_metrics:
      type: object
      nullable: true
      description: EXPLAIN plan analysis with speedup metrics (NEW in v3.0)
      properties:
        execution_ms: {type: number}
        baseline_ms: {type: number}
        speedup_ratio: {type: number}
        scan_count: {type: integer}
        index_count: {type: integer}
        uses_index: {type: boolean}
        efficiency_score: {type: number}
        suggestion: {type: string}
    hint_available:
      type: boolean
    hints_used:
      type: integer
    hint_penalty:
      type: number
      description: Cumulative hint penalty (0.0-0.3).
    step_count:
      type: integer
    max_steps:
      type: integer
    done:
      type: boolean
    best_reward_so_far:
      type: number
      description: Highest reward achieved in this episode so far.
    episode_summary:
      type: object
      nullable: true
      description: Full analytics emitted when done=True (NEW in v3.0)
      properties:
        solved: {type: boolean}
        termination_reason: {type: string, enum: [solved, max_steps]}
        best_reward: {type: number}
        total_steps: {type: integer}
        improvement_rate: {type: number}
        step_rewards: {type: array}
        hints_used: {type: integer}
        hint_penalty_total: {type: number}
